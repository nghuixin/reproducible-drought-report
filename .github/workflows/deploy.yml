name: Deploy Shinylive app  

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (cached)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install shinylive

      # Remove cached data so Snakemake refetches from source (daily data refresh)
      - name: Invalidate cached data for fresh fetch
        run: |
          rm -f data/monthly/japan_monthly_prcp.csv data/latest/japan_latest_prcp.csv
          rm -rf data/by_station_japan

      - name: Run pipeline (fetch by-station data, build monthly/latest, then app_data)
        run: |
          snakemake app_data -j 1

      - name: Export Shinylive site
        run: |
          shinylive export code build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4