name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (cached)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Keep CI focused: build the app bundle inputs (fast target)
      - name: Run Snakemake (app data pipeline)
        run: |
          snakemake app_data -j 1

      # Basic sanity check that expected artifacts exist
      - name: Validate app bundle outputs exist
        run: |
          test -f code/app_data/japan_stations.csv
          test -f code/app_data/japan_prcp_inventory.csv
          test -f code/app_data/japan_prcp_manifest.meta.json
          test -f code/app_data/japan_monthly_prcp.csv
          test -f code/app_data/japan_latest_prcp.csv
          echo "App bundle files present."